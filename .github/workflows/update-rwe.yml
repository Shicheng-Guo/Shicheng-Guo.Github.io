name: Update RWE

on:
  schedule:
    - cron: "27 7 * * *"   # daily at 07:27 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-rwe
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch and classify RWE news
        run: python3 scripts/fetch_rwe.py
      - name: Commit if changed
        run: |
          git config user.name "Shicheng Guo"
          git config user.email "Shicheng.Guo@hotmail.com"
          if ! git diff --quiet -- assets/data/rwe.json; then
            git add assets/data/rwe.json
            git commit -m "chore: update RWE data [skip ci]"
            git push
          else
            echo "No changes to RWE data."
          fi
