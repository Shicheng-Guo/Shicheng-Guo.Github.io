name: Update startup news

on:
  schedule:
    - cron: "7 8 * * *"   # daily at 08:07 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-startups
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch and classify startup news
        run: python3 scripts/fetch_startup_news.py
      - name: Commit if changed
        run: |
          git config user.name "Shicheng Guo"
          git config user.email "Shicheng.Guo@hotmail.com"
          if ! git diff --quiet -- assets/data/startup_news.json; then
            git add assets/data/startup_news.json
            git commit -m "chore: update startup news [skip ci]"
            git push
          else
            echo "No changes to startup news."
          fi
