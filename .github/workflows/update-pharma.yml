name: Update Pharma 5.0

on:
  schedule:
    - cron: "27 8 * * *"   # daily at 08:27 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-pharma
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch and classify Pharma 4.0/5.0/6.0 news
        run: python3 scripts/fetch_pharma.py
      - name: Commit if changed
        run: |
          git config user.name "Shicheng Guo"
          git config user.email "Shicheng.Guo@hotmail.com"
          if ! git diff --quiet -- assets/data/pharma.json; then
            git add assets/data/pharma.json
            git commit -m "chore: update Pharma 5.0 data [skip ci]"
            git push
          else
            echo "No changes to Pharma 5.0 data."
          fi
