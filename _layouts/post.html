---
layout: default
---
<div class="page-shell wrap">
  <a class="back-link" href="{{ site.url }}/archive.html">← All writing</a>
  <div class="page-hero reveal in">
    <span class="eyebrow">{{ page.date | date: "%B %-d, %Y" }}</span>
    <h1>{{ page.title }}</h1>
    <hr class="divider">
  </div>
  <article class="prose">
    {% if page.author %}<p class="post-meta">By {{ page.author }}</p>{% endif %}
    {{ content }}
  </article>
</div>
