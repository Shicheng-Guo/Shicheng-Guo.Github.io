---
layout: default
---
<a class="back-link" href="{{ site.url }}/archive.html"><i class="fa-solid fa-arrow-left"></i> All posts</a>
<header>
  <span class="eyebrow">{{ page.date | date: "%B %-d, %Y" }}</span>
  <h1 class="page__title">{{ page.title }}</h1>
  <hr class="page__divider">
</header>
{% if page.author %}<p class="post-meta">By {{ page.author }}</p>{% endif %}
{{ content }}
