---
layout: default
---
<div class="page-shell wrap">
  <div class="page-hero reveal in">
    {% if page.eyebrow %}<span class="eyebrow">{{ page.eyebrow }}</span>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.tagline %}<p class="lead">{{ page.tagline }}</p>{% endif %}
    <hr class="divider">
  </div>
  <article class="prose">
    {{ content }}
  </article>
</div>
